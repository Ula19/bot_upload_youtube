services:
  # Наш бот
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_started
      cobalt:
        condition: service_started
    environment:
      - COBALT_API_URL=http://cobalt:9000/
    volumes:
      # tmp для скачанных видео (не занимает место в контейнере)
      - /tmp/yt_bot:/tmp/yt_bot
      # cookies для YouTube (обновляются через /update_cookies)
      - ./cookies:/app/cookies
      # доступ к файлам Local Bot API (для /update_cookies)
      - bot-api-data:/var/lib/telegram-bot-api


  # Local Bot API — файлы до 2 ГБ без ограничений
  bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "${BOT_API_PORT:-8081}:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
      - /tmp/yt_bot:/tmp/yt_bot

  # Cobalt API — скачивание YouTube без cookies
  # Трафик проксируется через redsocks (прозрачно, без HTTP_PROXY)
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    init: true
    restart: unless-stopped
    ports:
      - "${COBALT_PORT:-9000}:9000"
    environment:
      API_URL: "http://cobalt:9000/"
    tmpfs:
      - /tmp:size=2G

  # Прозрачный прокси — весь трафик Cobalt идёт через резидентный IP
  redsocks:
    build: ./redsocks
    restart: unless-stopped
    network_mode: "service:cobalt"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      PROXY_IP: ${PROXY_IP}
      PROXY_PORT: ${PROXY_PORT}

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_youtube}
      POSTGRES_USER: ${DB_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_user} -d ${DB_NAME:-bot_4_youtube}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bot-api-data:
